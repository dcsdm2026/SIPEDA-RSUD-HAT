<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIPEDA - Login System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white/10 backdrop-blur-md rounded-2xl border border-white/20 p-8 shadow-2xl text-white">
        <div class="text-center mb-8">
            <div class="inline-flex p-4 rounded-full bg-indigo-600/30 text-indigo-400 mb-3 border border-indigo-500/30">
                <i class="fa-solid font-bold fa-hospital-user text-3xl"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-wide">SIPEDA RSUD HAT</h1>
            <p class="text-sm text-slate-300 mt-1">Sistem Informasi Pengelolaan Data Pegawai</p>
        </div>

        <form id="formLogin" class="space-y-5">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-300 mb-2">NIK / Email</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400"><i class="fa-solid fa-user"></i></span>
                    <input type="text" id="username" required placeholder="Masukkan NIK atau Email" 
                           class="w-full pl-10 pr-4 py-3 bg-slate-800/60 border border-slate-700 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none text-sm text-white placeholder-slate-500 transition">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-300 mb-2">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" id="password" required placeholder="••••••••" 
                           class="w-full pl-10 pr-4 py-3 bg-slate-800/60 border border-slate-700 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none text-sm text-white placeholder-slate-500 transition">
                </div>
            </div>

            <button type="submit" 
                    class="w-full py-3.5 bg-indigo-600 hover:bg-indigo-500 active:scale-98 text-white font-semibold rounded-xl shadow-lg shadow-indigo-600/30 transition duration-200">
                Masuk Sistem <i class="fa-solid fa-arrow-right-to-bracket ml-2"></i>
            </button>
        </form>

        <p class="text-center text-xs text-slate-400 mt-6">&copy; 2026 RSUD H. Amri Tambunan. All Rights Reserved.</p>
    </div>

    <script src="app/koneksi.js"></script>
    <script src="app/login.js"></script>
</body>
</html>
