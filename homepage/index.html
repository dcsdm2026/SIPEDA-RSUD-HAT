<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - SIPEDA RSUD HAT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-slate-100 font-sans antialiased">

    <div class="min-h-screen flex flex-col md:flex-row">
        <aside id="sidebar" class="w-full md:w-64 bg-slate-900 text-slate-300 flex-shrink-0 flex flex-col justify-between hidden md:flex">
            <div>
                <div class="h-16 flex items-center px-6 bg-slate-950 font-bold text-lg text-white border-b border-slate-800 space-x-3">
                    <i class="fa-solid fa-hospital-user text-indigo-400 text-xl"></i>
                    <span>SIPEDA ADMIN</span>
                </div>

                <nav class="mt-6 px-4 space-y-2">
                    <a href="#" onclick="loadPage('pegawai')" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-indigo-600 hover:text-white transition font-medium text-sm">
                        <i class="fa-solid fa-users w-5"></i> Data Pegawai
                    </a>
                    <a href="#" onclick="loadPage('riwayatpekerjaan')" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-indigo-600 hover:text-white transition font-medium text-sm">
                        <i class="fa-solid fa-briefcase w-5"></i> Riwayat Pekerjaan
                    </a>
                    <a href="#" onclick="loadPage('riwayatpendidikan')" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-indigo-600 hover:text-white transition font-medium text-sm">
                        <i class="fa-solid fa-graduation-cap w-5"></i> Riwayat Pendidikan
                    </a>
                    <a href="#" onclick="loadPage('pengaturan')" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-indigo-600 hover:text-white transition font-medium text-sm">
                        <i class="fa-solid fa-sliders w-5"></i> Pengaturan
                    </a>
                </nav>
            </div>

            <div class="p-4 border-t border-slate-800">
                <button onclick="logout()" class="w-full flex items-center justify-center gap-2 px-4 py-2.5 bg-red-500/10 hover:bg-red-600 text-red-400 hover:text-white rounded-xl text-sm font-semibold transition">
                    <i class="fa-solid fa-right-from-bracket"></i> Keluar
                </button>
            </div>
        </aside>

        <div class="flex-1 flex flex-col">
            <header class="bg-slate-900 text-white flex md:hidden items-center justify-between p-4 shadow-md">
                <div class="flex items-center space-x-2 font-bold">
                    <i class="fa-solid fa-hospital-user text-indigo-400"></i>
                    <span>SIPEDA RSUD HAT</span>
                </div>
                <button id="toggleMenu" class="text-xl focus:outline-none">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </header>

            <header class="bg-white border-b border-slate-200 px-8 py-4 hidden md:flex items-center justify-between">
                <h2 id="pageTitle" class="text-xl font-bold text-slate-800">Data Pegawai</h2>
                <div class="flex items-center space-x-4">
                    <span class="text-sm font-medium text-slate-600" id="userDisplayName">Administrator</span>
                    <img src="https://ui-avatars.com/api/?name=Admin&background=4f46e5&color=fff" class="w-9 h-9 rounded-full">
                </div>
            </header>

            <main id="mainContainer" class="flex-1 p-4 md:p-8 overflow-y-auto">
                </main>
        </div>
    </div>

    <script src="../app/koneksi.js"></script>
    <script src="../app/app.js"></script>
</body>
</html>
