<div class="space-y-6">
    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5 md:p-6">
        <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">
            
            <div class="flex flex-col sm:flex-row items-center gap-3 w-full lg:w-auto">
                <div class="relative w-full sm:w-80">
                    <input type="text" id="searchPegawai" oninput="handleSearch()" placeholder="Cari NIK, NIP, Nama, Jabatan..." 
                           class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-300 rounded-xl text-sm focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:outline-none transition">
                    <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-3.5 text-slate-400 text-sm"></i>
                </div>

                <div class="flex items-center gap-2 w-full sm:w-auto">
                    <label class="text-xs font-semibold text-slate-500 whitespace-nowrap">Tampilkan:</label>
                    <select id="limitPerPage" onchange="changeLimit()" 
                            class="w-full sm:w-auto bg-slate-50 border border-slate-300 rounded-xl px-3 py-2.5 text-sm font-medium text-slate-700 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                        <option value="50" selected>50 Data</option>
                        <option value="100">100 Data</option>
                        <option value="all">Semua Data</option>
                    </select>
                </div>
            </div>

            <div class="flex items-center gap-3 w-full lg:w-auto justify-end">
                <button onclick="refreshData()" class="px-4 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium rounded-xl text-sm transition">
                    <i class="fa-solid fa-rotate mr-1.5"></i> Refresh
                </button>
                <button onclick="openModalTambah()" class="px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-xl text-sm transition shadow-sm shadow-indigo-600/30">
                    <i class="fa-solid fa-plus mr-2"></i> Tambah Pegawai
                </button>
            </div>
        </div>
    </div>

    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left text-sm text-slate-600">
                <thead class="bg-slate-800 text-slate-200 uppercase text-xs font-semibold tracking-wider">
                    <tr>
                        <th class="p-4 text-center w-12">NO</th>
                        <th class="p-4">NIK / NIP</th>
                        <th class="p-4">Nama Lengkap / Ruangan</th>
                        <th class="p-4">Golongan / Jabatan</th>
                        <th class="p-4">Kelompok Tenaga / Status</th>
                        <th class="p-4">Pendidikan / Masa Kerja</th>
                        <th class="p-4 text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody id="tablePegawaiBody" class="divide-y divide-slate-200 bg-white">
                    </tbody>
            </table>
        </div>

        <div class="px-6 py-4 bg-slate-50 border-t border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4">
            <p id="paginationInfo" class="text-xs font-medium text-slate-500">
                Menampilkan 0 data
            </p>
            <div id="paginationControls" class="flex items-center gap-2">
                </div>
        </div>
    </div>
</div>

<div id="modalViewPegawai" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center hidden p-4">
    <div class="bg-white rounded-2xl max-w-2xl w-full p-6 shadow-2xl space-y-4 max-h-[90vh] overflow-y-auto">
        <div class="flex justify-between items-center border-b pb-3">
            <h3 class="text-lg font-bold text-slate-800">Detail Informasi Pegawai</h3>
            <button onclick="closeModalView()" class="text-slate-400 hover:text-slate-600 text-xl font-bold">&times;</button>
        </div>
        <div id="modalViewContent" class="space-y-3 text-sm text-slate-600">
            </div>
        <div class="text-right border-t pt-3">
            <button onclick="closeModalView()" class="px-4 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 font-semibold rounded-xl text-xs transition">Tutup</button>
        </div>
    </div>
</div>
