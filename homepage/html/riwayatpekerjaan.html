<!DOCTYPE html>
<html lang="id" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riwayat Pekerjaan - SIPEDA RSUD HAT</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    :root {
      --bg-body: #0f172a;
      --bg-card: #1e293b;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border-color: rgba(255, 255, 255, 0.08);
    }

    [data-bs-theme="light"] {
      --bg-body: #f1f5f9;
      --bg-card: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border-color: rgba(0, 0, 0, 0.08);
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg-body);
      color: var(--text-main);
      padding: 1.5rem;
    }

    .card-custom {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    }

    .table-responsive {
      border-radius: 8px;
      overflow: hidden;
    }

    .table-custom {
      color: var(--text-main);
      margin-bottom: 0;
    }

    .table-custom th {
      background-color: rgba(255, 255, 255, 0.05);
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 2px solid var(--border-color);
      padding: 12px 16px;
    }

    .table-custom td {
      padding: 12px 16px;
      vertical-align: middle;
      border-bottom: 1px solid var(--border-color);
      font-size: 0.9rem;
    }

    .required::after {
      content: " *";
      color: #ef4444;
    }
  </style>
</head>
<body>

  <div class="container-fluid p-0">
    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-3">
      <div>
        <h4 class="fw-bold mb-1"><i class="bi bi-briefcase-fill text-primary me-2"></i>Data Riwayat Pekerjaan</h4>
        <p class="text-secondary small mb-0">Kelola dan pantau riwayat pekerjaan serta SK pegawai RSUD HAT</p>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-outline-success btn-sm" onclick="exportToExcel()">
          <i class="bi bi-file-earmark-excel me-1"></i> Export Excel
        </button>
        <button class="btn btn-outline-danger btn-sm" onclick="exportToPDF()">
          <i class="bi bi-file-earmark-pdf me-1"></i> Export PDF
        </button>
        <button class="btn btn-primary btn-sm" onclick="openModalTambah()">
          <i class="bi bi-plus-lg me-1"></i> Tambah Pekerjaan
        </button>
      </div>
    </div>

    <div class="card card-custom p-3 mb-4">
      <div class="row g-2">
        <div class="col-md-5">
          <label class="form-label small text-secondary">Cari NIK / Nama / SK</label>
          <div class="input-group input-group-sm">
            <span class="input-group-text bg-transparent border-secondary-subtle"><i class="bi bi-search"></i></span>
            <input type="text" id="searchInput" class="form-control" placeholder="Ketik NIK, Nama, Uraian, atau Nomor SK..." oninput="handleSearch()">
          </div>
        </div>

        <div class="col-md-3">
          <label class="form-label small text-secondary">Filter Tahun</label>
          <select id="filterTahun" class="form-select form-select-sm" onchange="applyFilters()">
            <option value="">Semua Tahun</option>
          </select>
        </div>

        <div class="col-md-4">
          <label class="form-label small text-secondary">Filter Pejabat</label>
          <select id="filterPejabat" class="form-select form-select-sm" onchange="applyFilters()">
            <option value="">Semua Pejabat</option>
          </select>
        </div>
      </div>
    </div>

    <div class="card card-custom">
      <div class="table-responsive">
        <table class="table table-custom align-middle" id="tableRiwayatPekerjaan">
          <thead>
            <tr>
              <th style="width: 50px;" class="text-center">No</th>
              <th>Nama / NIK</th>
              <th>Tahun / Uraian Perubahan</th>
              <th>Periode Kerja</th>
              <th>Gaji Pokok</th>
              <th>Pejabat / SK</th>
              <th style="width: 130px;" class="text-center">Aksi</th>
            </tr>
          </thead>
          <tbody id="tbodyRiwayatPekerjaan">
            <tr>
              <td colspan="7" class="text-center py-4 text-secondary">
                <div class="spinner-border spinner-border-sm me-2" role="status"></div>Memuat data...
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="d-flex justify-content-between align-items-center p-3 border-top border-secondary-subtle">
        <span class="small text-secondary" id="infoPagination">Menampilkan 0 data</span>
        <nav>
          <ul class="pagination pagination-sm mb-0" id="paginationList"></ul>
        </nav>
      </div>
    </div>
  </div>

  <div class="modal fade" id="modalFormPekerjaan" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content card-custom">
        <div class="modal-header border-bottom border-secondary-subtle">
          <h6 class="modal-title fw-bold" id="modalFormTitle"><i class="bi bi-briefcase me-2"></i>Form Riwayat Pekerjaan</h6>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <form id="formRiwayatPekerjaan" onsubmit="saveDataPekerjaan(event)">
          <div class="modal-body">
            <input type="hidden" id="id_riwayatpekerjaan">
            
            <datalist id="listPegawaiAuto"></datalist>

            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label small required">Cari NIK / Nama Pegawai</label>
                <input type="text" id="formNik" class="form-control form-control-sm" list="listPegawaiAuto" required placeholder="Ketik NIK atau Nama Pegawai..." autocomplete="off">
                <div class="form-text small text-secondary">Pilih dari rekomendasi yang muncul.</div>
              </div>
              <div class="col-md-6">
                <label class="form-label small required">Nama Pegawai</label>
                <input type="text" id="formNama" class="form-control form-control-sm" required placeholder="Nama terisi otomatis" readonly>
              </div>

              <div class="col-md-4">
                <label class="form-label small required">Tahun</label>
                <input type="number" id="formTahun" class="form-control form-control-sm" min="1970" max="2099" required placeholder="Contoh: 2024">
              </div>
              <div class="col-md-8">
                <label class="form-label small required">Uraian Perubahan / Jabatan</label>
                <input type="text" id="formUraianPerubahan" class="form-control form-control-sm" required placeholder="Contoh: Kenaikan Gaji Berkala / Pengangkatan Jabatan">
              </div>

              <div class="col-md-6">
                <label class="form-label small">Tanggal Mulai</label>
                <input type="date" id="formMulai" class="form-control form-control-sm">
              </div>
              <div class="col-md-6">
                <label class="form-label small">Tanggal Akhir</label>
                <input type="date" id="formAkhir" class="form-control form-control-sm">
              </div>

              <div class="col-md-6">
                <label class="form-label small">Gaji Pokok (Rp)</label>
                <input type="number" id="formGajiPokok" class="form-control form-control-sm" min="0" placeholder="Contoh: 3500000">
              </div>
              <div class="col-md-6">
                <label class="form-label small">Pejabat Penandatangan SK</label>
                <input type="text" id="formPejabat" class="form-control form-control-sm" placeholder="Contoh: Direktur RSUD HAT">
              </div>

              <div class="col-md-6">
                <label class="form-label small">Tanggal SK</label>
                <input type="date" id="formTanggal" class="form-control form-control-sm">
              </div>
              <div class="col-md-6">
                <label class="form-label small">Nomor SK</label>
                <input type="text" id="formNomor" class="form-control form-control-sm" placeholder="Contoh: 800/123/RSUD/2024">
              </div>

              <div class="col-md-12">
                <label class="form-label small">Upload / URL Dokumen SK</label>
                <input type="text" id="formUploadSk" class="form-control form-control-sm" placeholder="Link/URL berkas SK (Google Drive / Storage Supabase)">
              </div>
            </div>
          </div>
          <div class="modal-footer border-top border-secondary-subtle">
            <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Batal</button>
            <button type="submit" class="btn btn-primary btn-sm" id="btnSave">Simpan Data</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="modal fade" id="modalDetailPekerjaan" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content card-custom">
        <div class="modal-header border-bottom border-secondary-subtle">
          <h6 class="modal-title fw-bold"><i class="bi bi-info-circle me-2"></i>Detail Riwayat Pekerjaan</h6>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body p-3" id="detailBody">
          </div>
        <div class="modal-footer border-top border-secondary-subtle">
          <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Tutup</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

  <script src="../../app/koneksi.js"></script>

  <script src="../js/riwayatpekerjaan.js"></script>
</body>
</html>
