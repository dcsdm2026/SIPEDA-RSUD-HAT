<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Pegawai - SIPEDA RSUD HAT</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏥</text></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        (function() {
            const userSession = JSON.parse(localStorage.getItem('sipeda_user'));
            if (!userSession) {
                window.location.href = 'index.html';
            }
        })();
    </script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

    <nav class="bg-slate-900 border-b border-slate-800 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-500/10 border border-indigo-500/30 rounded-xl flex items-center justify-center text-indigo-400">
                <i class="fa-solid fa-id-card text-xl"></i>
            </div>
            <div>
                <h1 class="font-bold text-sm text-white">SIPEDA Portal Pegawai</h1>
                <p class="text-xs text-slate-400">RSUD H. Amri Tambunan</p>
            </div>
        </div>

        <button onclick="handleLogout()" class="px-3.5 py-2 bg-red-500/10 border border-red-500/30 text-red-400 rounded-xl text-xs hover:bg-red-500/20 transition-all">
            <i class="fa-solid fa-right-from-bracket mr-1"></i> Keluar
        </button>
    </nav>

    <div class="max-w-4xl mx-auto p-6 space-y-6">
        <div class="bg-slate-900/80 border border-slate-800 rounded-2xl p-6 flex flex-col md:flex-row items-center gap-6">
            <div class="w-24 h-24 bg-slate-800 border-2 border-indigo-500/40 rounded-2xl flex items-center justify-center text-slate-500 overflow-hidden shadow-xl">
                <i class="fa-solid fa-user text-4xl"></i>
            </div>
            <div class="text-center md:text-left">
                <span class="px-3 py-1 bg-indigo-500/10 border border-indigo-500/30 text-indigo-400 text-[10px] font-semibold rounded-full uppercase">Pegawai</span>
                <h2 id="pegawaiNama" class="text-xl font-bold text-white mt-2">-</h2>
                <p id="pegawaiJabatan" class="text-xs text-slate-400 mt-1">-</p>
                <p id="pegawaiNik" class="text-xs text-slate-500 font-mono mt-0.5">-</p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('sipeda_user'));
            if (!user) return;

            document.getElementById('pegawaiNama').textContent = user.nama || 'Pegawai';
            document.getElementById('pegawaiJabatan').textContent = user.jabatan || 'Staf Pegawai';
            document.getElementById('pegawaiNik').textContent = `NIK / NIP: ${user.nik || '-'}`;
        });

        function handleLogout() {
            localStorage.removeItem('sipeda_user');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
