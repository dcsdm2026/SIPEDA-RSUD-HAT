<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIPEDA - RSUD H. Amri Tambunan</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏥</text></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        (function() {
            const user = JSON.parse(localStorage.getItem('sipeda_user'));
            if (user) {
                const role = (user.aksesrole || '').toLowerCase();
                if (role === 'superadmin' || role === 'admin') {
                    // Mengarahkan ke beranda.html (bukan dashboard.html)
                    window.location.href = 'beranda.html';
                } else {
                    window.location.href = 'portal.html';
                }
            }
        })();
    </script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-slate-900/80 backdrop-blur-xl border border-slate-800 rounded-3xl p-8 shadow-2xl">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-emerald-500/10">
                <i class="fa-solid fa-hospital-user text-3xl"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-white">SIPEDA RSUD HAT</h1>
            <p class="text-xs text-slate-400 mt-1">Sistem Informasi Pengelola Data Pegawai Modern</p>
        </div>

        <div id="loginAlert" class="hidden mb-6"></div>

        <form onsubmit="handleLogin(event)" class="space-y-5">
            <div>
                <label class="block text-xs font-medium text-slate-300 mb-1.5">Email / NIK Pegawai</label>
                <div class="relative">
                    <i class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                    <input type="text" id="username" required autocomplete="username"
                           placeholder="Masukkan Email atau NIK..."
                           class="w-full bg-slate-950/60 border border-slate-800 rounded-xl py-3 pl-11 pr-4 text-sm text-slate-100 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all placeholder:text-slate-600">
                </div>
            </div>

            <div>
                <label class="block text-xs font-medium text-slate-300 mb-1.5">Kata Sandi</label>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                    <input type="password" id="password" required autocomplete="current-password"
                           placeholder="••••••••"
                           class="w-full bg-slate-950/60 border border-slate-800 rounded-xl py-3 pl-11 pr-12 text-sm text-slate-100 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all placeholder:text-slate-600">
                    <button type="button" onclick="togglePassword()" 
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-emerald-400 transition-colors focus:outline-none p-1">
                        <i id="toggleIcon" class="fa-solid fa-eye text-sm"></i>
                    </button>
                </div>
            </div>

            <button type="submit" id="btnLogin"
                    class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-medium py-3 px-4 rounded-xl shadow-lg shadow-emerald-600/20 transition-all flex items-center justify-center gap-2 text-sm mt-2">
                <span>Masuk ke Sistem</span>
                <i class="fa-solid fa-right-to-bracket text-xs"></i>
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-800 text-center text-xs text-slate-500">
            <p>Sistem Pengelola Data RSUD H. Amri Tambunan</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app/koneksi.js"></script>
    <script src="app/login.js"></script>
</body>
</html>
