<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIPEDA RSUD HAT - Beranda Utama</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  
  <style>
    :root {
      --sidebar-width: 260px;
      --primary-color: #0d6efd;
      --dark-bg: #1e293b;
    }
    
    body {
      overflow-x: hidden;
      background-color: #f8f9fa;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    /* Layout Container */
    .wrapper {
      display: flex;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    /* Sidebar Styling */
    #sidebar {
      min-width: var(--sidebar-width);
      max-width: var(--sidebar-width);
      height: 100vh;
      background: var(--dark-bg);
      color: #fff;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      z-index: 1000;
    }

    #sidebar .sidebar-header {
      padding: 20px 18px;
      background: rgba(0, 0, 0, 0.2);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    #sidebar ul.components {
      padding: 15px 10px;
      flex-grow: 1;
    }

    #sidebar ul li {
      margin-bottom: 5px;
    }

    #sidebar ul li a {
      padding: 12px 15px;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      color: #cbd5e1;
      text-decoration: none;
      border-radius: 8px;
      transition: all 0.2s ease;
    }

    #sidebar ul li a:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.1);
    }

    #sidebar ul li a.active {
      color: #fff;
      background: var(--primary-color);
      font-weight: 600;
    }

    #sidebar ul li a i {
      margin-right: 12px;
      font-size: 1.2rem;
    }

    /* Main Content Area */
    #main-content {
      flex-grow: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #f8f9fa;
    }

    /* Dynamic Frame */
    .content-frame {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Mobile Responsive Styles */
    @media (max-width: 768px) {
      #sidebar {
        margin-left: calc(-1 * var(--sidebar-width));
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
      }
      #sidebar.active {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <nav id="sidebar">
      <div class="sidebar-header d-flex align-items-center justify-content-between">
        <div class="d-flex align-items-center">
          <i class="bi bi-hospital fs-3 text-primary me-2"></i>
          <div>
            <h6 class="fw-bold mb-0 text-white">SIPEDA</h6>
            <small class="text-muted" style="font-size: 11px;">RSUD HAT</small>
          </div>
        </div>
        <button type="button" class="btn btn-sm btn-outline-light d-md-none" id="sidebarClose">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>

      <ul class="list-unstyled components">
        <li class="px-3 pb-2 text-uppercase text-muted fw-bold" style="font-size: 11px; letter-spacing: 1px;">
          Menu Utama
        </li>
        
        <li>
          <a href="pegawai.html" target="contentFrame" class="nav-menu active" onclick="setActive(this)">
            <i class="bi bi-people-fill"></i> Data Pegawai
          </a>
        </li>

        <li>
          <a href="riwayatpendidikan.html" target="contentFrame" class="nav-menu" onclick="setActive(this)">
            <i class="bi bi-mortarboard-fill"></i> Riwayat Pendidikan
          </a>
        </li>

        <li>
          <a href="riwayatpekerjaan.html" target="contentFrame" class="nav-menu" onclick="setActive(this)">
            <i class="bi bi-briefcase-fill"></i> Riwayat Pekerjaan
          </a>
        </li>

        <li class="px-3 pt-3 pb-2 text-uppercase text-muted fw-bold" style="font-size: 11px; letter-spacing: 1px;">
          Pengaturan & Sesi
        </li>

        <li>
          <a href="pengaturan.html" target="contentFrame" class="nav-menu" onclick="setActive(this)">
            <i class="bi bi-gear-fill"></i> Pengaturan
          </a>
        </li>

        <li>
          <a href="#" class="text-danger mt-2" onclick="prosesLogout(event)">
            <i class="bi bi-box-arrow-right text-danger"></i> Logout
          </a>
        </li>
      </ul>
    </nav>

    <div id="main-content">
      <nav class="navbar navbar-light bg-white border-bottom d-md-none px-3">
        <button type="button" id="sidebarCollapse" class="btn btn-primary btn-sm">
          <i class="bi bi-list fs-5 me-1"></i> Menu
        </button>
        <span class="fw-bold text-primary">SIPEDA RSUD HAT</span>
      </nav>

      <iframe name="contentFrame" id="contentFrame" src="pegawai.html" class="content-frame"></iframe>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // Toggle Sidebar Mobile
    const sidebar = document.getElementById('sidebar');
    const sidebarCollapse = document.getElementById('sidebarCollapse');
    const sidebarClose = document.getElementById('sidebarClose');

    if (sidebarCollapse) {
      sidebarCollapse.addEventListener('click', () => {
        sidebar.classList.add('active');
      });
    }

    if (sidebarClose) {
      sidebarClose.addEventListener('click', () => {
        sidebar.classList.remove('active');
      });
    }

    // Mengatur Menu Aktif saat Diklik
    function setActive(element) {
      document.querySelectorAll('.nav-menu').forEach(item => item.classList.remove('active'));
      element.classList.add('active');

      // Tutup otomatis sidebar pada mode mobile setelah memilih menu
      if (window.innerWidth <= 768) {
        sidebar.classList.remove('active');
      }
    }

    // Fungsi Logout
    function prosesLogout(event) {
      event.preventDefault();
      if (confirm("Apakah Anda yakin ingin keluar dari aplikasi SIPEDA?")) {
        // Membersihkan sesi lokal
        localStorage.clear();
        sessionStorage.clear();
        
        // Mengalihkan kembali ke halaman login
        window.location.href = "login.html";
      }
    }
  </script>
</body>
</html>
