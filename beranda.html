<!DOCTYPE html>
<html lang="id" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIPEDA RSUD HAT - Beranda Utama</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  
  <style>
    :root {
      --sidebar-width: 270px;
      --sidebar-collapsed-width: 78px;
      --primary-color: #2563eb;
      --primary-hover: #1d4ed8;
      
      /* Dark Theme Defaults */
      --bg-body: #0f172a;
      --bg-sidebar: #1e293b;
      --bg-card: #1e293b;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border-color: rgba(255, 255, 255, 0.08);
      --hover-bg: rgba(255, 255, 255, 0.06);
      --submenu-bg: rgba(0, 0, 0, 0.25);
    }

    [data-bs-theme="light"] {
      /* Light Theme Overrides */
      --bg-body: #f1f5f9;
      --bg-sidebar: #ffffff;
      --bg-card: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border-color: rgba(0, 0, 0, 0.08);
      --hover-bg: rgba(37, 99, 235, 0.08);
      --submenu-bg: rgba(0, 0, 0, 0.03);
    }
    
    * {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
    }

    body {
      overflow-x: hidden;
      background-color: var(--bg-body);
      color: var(--text-main);
      margin: 0;
      padding: 0;
    }

    /* Layout Wrapper */
    .wrapper {
      display: flex;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* Sidebar Main Base */
    #sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      height: 100vh;
      background: var(--bg-sidebar);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      z-index: 1000;
      border-right: 1px solid var(--border-color);
      box-shadow: 4px 0 25px rgba(0, 0, 0, 0.05);
      transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), min-width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    /* Sidebar Header */
    #sidebar .sidebar-header {
      padding: 20px 16px;
      border-bottom: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    .brand-icon {
      width: 40px;
      height: 40px;
      min-width: 40px;
      background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }

    /* Menu Bagian Atas (Scrollable) */
    #sidebar .menu-container {
      padding: 16px 12px;
      flex-grow: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }

    /* Menu Bagian Paling Bawah (Fixed Bottom) */
    #sidebar .sidebar-footer {
      padding: 16px 12px;
      border-top: 1px solid var(--border-color);
      margin-top: auto; /* Memaksa Pengaturan, Mode, & Logout tetap di paling bawah */
      flex-shrink: 0;
      background: var(--bg-sidebar);
    }

    .menu-header {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text-muted);
      padding: 6px 12px;
      white-space: nowrap;
    }

    /* Link Navigasi Custom */
    .nav-link-custom {
      padding: 11px 14px;
      font-size: 0.92rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      color: var(--text-main);
      text-decoration: none;
      border-radius: 10px;
      margin-bottom: 4px;
      transition: all 0.2s ease;
      cursor: pointer;
      white-space: nowrap;
    }

    .nav-link-custom:hover {
      color: var(--primary-color);
      background: var(--hover-bg);
    }

    .nav-link-custom.active {
      color: #ffffff !important;
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      font-weight: 600;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
    }

    .nav-link-custom i.icon-main {
      font-size: 1.2rem;
      margin-right: 12px;
      width: 22px;
      min-width: 22px;
      text-align: center;
    }

    /* Chevron Dynamic Icon */
    .chevron-icon {
      margin-left: auto;
      font-size: 0.8rem;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .nav-link-custom[aria-expanded="true"] .chevron-icon {
      transform: rotate(180deg);
    }

    /* Submenu Dropdown Modern */
    .submenu {
      background: var(--submenu-bg);
      border-radius: 10px;
      padding: 4px;
      margin: 2px 0 6px 0;
      border: 1px solid var(--border-color);
    }

    .submenu .nav-link-custom {
      padding-left: 44px;
      font-size: 0.88rem;
      margin-bottom: 2px;
      position: relative;
    }

    .submenu .nav-link-custom::before {
      content: '';
      position: absolute;
      left: 22px;
      top: 50%;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: var(--text-muted);
      transform: translateY(-50%);
      transition: all 0.2s ease;
    }

    .submenu .nav-link-custom:hover::before,
    .submenu .nav-link-custom.active::before {
      background-color: #60a5fa;
      box-shadow: 0 0 8px #60a5fa;
    }

    /* MODE COLLAPSED / HIDE SIDEBAR (DESKTOP) */
    #sidebar.collapsed {
      width: var(--sidebar-collapsed-width);
      min-width: var(--sidebar-collapsed-width);
    }

    #sidebar.collapsed .brand-title,
    #sidebar.collapsed .menu-header,
    #sidebar.collapsed .link-text,
    #sidebar.collapsed .chevron-icon,
    #sidebar.collapsed .submenu {
      display: none !important;
    }

    #sidebar.collapsed .sidebar-header {
      justify-content: center !important;
      padding: 20px 0;
    }

    #sidebar.collapsed .nav-link-custom {
      justify-content: center;
      padding: 12px;
    }

    #sidebar.collapsed .nav-link-custom i.icon-main {
      margin-right: 0;
    }

    #sidebar.collapsed .sidebar-footer {
      padding: 16px 8px;
    }

    /* Main Content Area */
    #main-content {
      flex-grow: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg-body);
    }

    .content-frame {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Top Navigation Bar */
    .top-navbar {
      background: var(--bg-sidebar);
      border-bottom: 1px solid var(--border-color);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* Responsif Mobile */
    @media (max-width: 768px) {
      #sidebar {
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        margin-left: calc(-1 * var(--sidebar-width));
        width: var(--sidebar-width) !important;
        min-width: var(--sidebar-width) !important;
      }

      #sidebar.active-mobile {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <nav id="sidebar" id="sidebar">
      
      <div class="sidebar-header d-flex align-items-center justify-content-between">
        <div class="d-flex align-items-center gap-3 overflow-hidden">
          <div class="brand-icon">
            <i class="bi bi-hospital fs-5 text-white"></i>
          </div>
          <div class="brand-title">
            <h6 class="fw-bold mb-0" style="letter-spacing: 0.5px;">SIPEDA</h6>
            <small class="text-muted" style="font-size: 11px;">RSUD HAT</small>
          </div>
        </div>
        <button type="button" class="btn btn-sm btn-link text-secondary p-0 d-none d-md-block" id="btnToggleSidebar" title="Sembunyikan/Tampilkan Sidebar">
          <i class="bi bi-indent fs-5"></i>
        </button>
        <button type="button" class="btn btn-sm text-secondary d-md-none p-0" id="sidebarClose">
          <i class="bi bi-x-lg fs-5"></i>
        </button>
      </div>

      <div class="menu-container">
        
        <div class="menu-header mb-1">Menu Utama</div>

        <a href="dashboard.html" target="contentFrame" class="nav-link-custom active" onclick="setActive(this)" title="Dashboard">
          <i class="bi bi-grid-1x2-fill icon-main"></i>
          <span class="link-text">Dashboard</span>
        </a>

        <a class="nav-link-custom mt-1" data-bs-toggle="collapse" href="#sdmSubmenu" role="button" aria-expanded="false" aria-controls="sdmSubmenu" title="Sumber Daya Manusia">
          <i class="bi bi-people-fill icon-main"></i>
          <span class="link-text">Sumber Daya Manusia</span>
          <i class="bi bi-chevron-down chevron-icon"></i>
        </a>
        
        <div class="collapse submenu" id="sdmSubmenu">
          <a href="/homepage/html/pegawai.html" target="contentFrame" class="nav-link-custom" onclick="setActive(this)">
            <span class="link-text">Master Data</span>
          </a>
          <a href="riwayatpendidikan.html" target="contentFrame" class="nav-link-custom" onclick="setActive(this)">
            <span class="link-text">Riwayat Pendidikan</span>
          </a>
          <a href="riwayatpekerjaan.html" target="contentFrame" class="nav-link-custom" onclick="setActive(this)">
            <span class="link-text">Riwayat Pekerjaan</span>
          </a>
        </div>

      </div>

      <div class="sidebar-footer">
        <div class="menu-header mb-1">Pengaturan & Sesi</div>

        <a href="javascript:void(0)" class="nav-link-custom" id="btnThemeToggle" onclick="toggleTheme()" title="Ubah Mode Tampilan">
          <i class="bi bi-moon-stars-fill icon-main" id="themeIcon"></i>
          <span class="link-text" id="themeText">Mode Gelap</span>
        </a>

        <a href="pengaturan.html" target="contentFrame" class="nav-link-custom" onclick="setActive(this)" title="Pengaturan">
          <i class="bi bi-sliders icon-main"></i>
          <span class="link-text">Pengaturan</span>
        </a>

        <a href="index.html" class="nav-link-custom text-danger mt-1" onclick="prosesLogout(event)" title="Logout">
  <i class="bi bi-box-arrow-right icon-main text-danger"></i>
  <span class="link-text">Logout</span>
</a>
      </div>

    </nav>

    <div id="main-content">
      
      <nav class="top-navbar">
        <div class="d-flex align-items-center gap-2">
          <button type="button" id="sidebarCollapseMobile" class="btn btn-outline-primary btn-sm d-md-none rounded-3">
            <i class="bi bi-list fs-5"></i>
          </button>
          <button type="button" id="btnToggleSidebarHeader" class="btn btn-sm btn-outline-secondary d-none d-md-inline-flex align-items-center gap-1 rounded-3">
            <i class="bi bi-layout-sidebar-inset fs-6"></i>
            <span>Sidebar</span>
          </button>
          <span class="fw-bold ms-2 d-none d-sm-inline">SIPEDA RSUD HAT</span>
        </div>

        <div class="d-flex align-items-center gap-3">
          <small class="text-muted d-none d-sm-inline" id="currentDate"></small>
        </div>
      </nav>

      <iframe name="contentFrame" id="contentFrame" src="dashboard.html" class="content-frame"></iframe>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // ----------------------------------------------------
    // 1. KONTROL TEMA (DARK / LIGHT MODE TOGGLE)
    // ----------------------------------------------------
    const htmlEl = document.documentElement;
    const themeIcon = document.getElementById('themeIcon');
    const themeText = document.getElementById('themeText');

    function applyTheme(theme) {
      htmlEl.setAttribute('data-bs-theme', theme);
      localStorage.setItem('sipeda_theme', theme);

      if (theme === 'dark') {
        themeIcon.className = 'bi bi-moon-stars-fill icon-main text-warning';
        themeText.textContent = 'Mode Gelap';
      } else {
        themeIcon.className = 'bi bi-sun-fill icon-main text-warning';
        themeText.textContent = 'Mode Terang';
      }
    }

    function toggleTheme() {
      const currentTheme = htmlEl.getAttribute('data-bs-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      applyTheme(newTheme);
    }

    // Inisialisasi Tema dari LocalStorage
    const savedTheme = localStorage.getItem('sipeda_theme') || 'dark';
    applyTheme(savedTheme);


    // ----------------------------------------------------
    // 2. KONTROL SIDEBAR (COLLAPSE / HIDE & MOBILE TOGGLE)
    // ----------------------------------------------------
    const sidebar = document.getElementById('sidebar');
    const btnToggleSidebar = document.getElementById('btnToggleSidebar');
    const btnToggleSidebarHeader = document.getElementById('btnToggleSidebarHeader');
    const sidebarCollapseMobile = document.getElementById('sidebarCollapseMobile');
    const sidebarClose = document.getElementById('sidebarClose');

    // Toggle Desktop Collapse (Sembunyikan/Kecilkan Sidebar)
    function toggleSidebarDesktop() {
      sidebar.classList.toggle('collapsed');
      
      // Jika disembunyikan, otomatis tutup submenu yang sedang terbuka
      if (sidebar.classList.contains('collapsed')) {
        const openedSubmenu = document.querySelector('.submenu.show');
        if (openedSubmenu) {
          const bsCollapse = bootstrap.Collapse.getInstance(openedSubmenu);
          if (bsCollapse) bsCollapse.hide();
        }
      }
    }

    if (btnToggleSidebar) btnToggleSidebar.addEventListener('click', toggleSidebarDesktop);
    if (btnToggleSidebarHeader) btnToggleSidebarHeader.addEventListener('click', toggleSidebarDesktop);

    // Toggle Mobile Drawer
    if (sidebarCollapseMobile) {
      sidebarCollapseMobile.addEventListener('click', () => {
        sidebar.classList.add('active-mobile');
      });
    }

    if (sidebarClose) {
      sidebarClose.addEventListener('click', () => {
        sidebar.classList.remove('active-mobile');
      });
    }


    // ----------------------------------------------------
    // 3. NAVIGASI AKSI MENU & LOGOUT
    // ----------------------------------------------------
    function setActive(element) {
      document.querySelectorAll('.nav-link-custom').forEach(item => {
        item.classList.remove('active');
      });

      element.classList.add('active');

      // Jika submenu aktif, tandai juga parent dropdown-nya
      const parentCollapse = element.closest('.collapse');
      if (parentCollapse) {
        const toggleBtn = document.querySelector(`[href="#${parentCollapse.id}"]`);
        if (toggleBtn) {
          toggleBtn.classList.add('active');
        }
      }

      // Auto-close sidebar jika dalam tampilan mobile
      if (window.innerWidth <= 768) {
        sidebar.classList.remove('active-mobile');
      }
    }

    function prosesLogout(event) {
  if (event) event.preventDefault(); // Mencegah tindakan default tombol/link

  // 1. Hapus semua data sesi / localStorage
  try {
    localStorage.clear();
    sessionStorage.clear();
  } catch (err) {
    console.error("Gagal membersihkan storage:", err);
  }

  // 2. Arahkan layar utama ke index.html (halaman login Anda)
  window.top.location.href = "index.html"; 
}

    // Tampilkan Tanggal Hari Ini
    document.getElementById('currentDate').textContent = new Date().toLocaleDateString('id-ID', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });
  </script>
</body>
</html>
